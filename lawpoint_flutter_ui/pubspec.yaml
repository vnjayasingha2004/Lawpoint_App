name: lawpoint_app

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_webrtc: ^1.3.0
  permission_handler: ^11.3.1
  webview_flutter: ^4.13.0
